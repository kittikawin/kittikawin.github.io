<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1)}
  .wrap{padding:20px 24px;box-sizing:border-box;display:flex;gap:18px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;gap:6px;align-items:center}
  .box{width:80px;height:80px;background:var(--paper-2);border:1px solid var(--border-1)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);
    text-transform:uppercase;letter-spacing:.12em;text-align:center}
</style></head><body><div class="wrap">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">sm · 4</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="lbl">lg · 14</div></div>
  <div class="item"><div class="box" style="border-radius:22px"></div><div class="lbl">xl · 22</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill · 999</div></div>
</div></body></html>
