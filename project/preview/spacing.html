<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1)}
  .wrap{padding:20px 24px;box-sizing:border-box}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:90px}
  .bar{height:10px;background:var(--accent);border-radius:3px}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-4)}
</style></head><body><div class="wrap">
  <div class="row"><span class="lbl">--space-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="lbl">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="lbl">--space-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="lbl">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="lbl">--space-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="lbl">--space-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="lbl">--space-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="lbl">--space-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
  <div class="row"><span class="lbl">--space-9</span><div class="bar" style="width:96px"></div><span class="px">96</span></div>
  <div class="row"><span class="lbl">--space-10</span><div class="bar" style="width:128px"></div><span class="px">128</span></div>
</div></body></html>
