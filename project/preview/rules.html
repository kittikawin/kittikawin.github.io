<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1)}
  .wrap{padding:20px 24px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:14px;align-items:center}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.12em;width:120px;flex-shrink:0}
  .rule-ink{width:36px;height:2px;background:var(--fg-1)}
  .rule-hair{width:200px;height:1px;background:var(--border-1)}
  .rule-strong{width:200px;height:1px;background:var(--border-2)}
  .quote{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--fg-1);
    border-left:2px solid var(--border-strong);padding:0 12px;margin:0}
</style></head><body><div class="wrap">
  <div class="row"><span class="lbl">Ink rule · signature</span><div class="rule-ink"></div></div>
  <div class="row"><span class="lbl">Hairline · cards</span><div class="rule-hair"></div></div>
  <div class="row"><span class="lbl">Strong · inputs</span><div class="rule-strong"></div></div>
  <div class="row"><span class="lbl">Blockquote</span><blockquote class="quote">Practical over academic. Code is the proof.</blockquote></div>
</div></body></html>
