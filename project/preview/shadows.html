<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1)}
  .wrap{padding:24px;box-sizing:border-box;display:flex;gap:22px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;gap:10px;align-items:center}
  .box{width:110px;height:80px;background:var(--paper-0);border-radius:8px;
    border:1px solid var(--border-1)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);
    text-transform:uppercase;letter-spacing:.12em;text-align:center}
</style></head><body><div class="wrap">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs · hairline</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm · card</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md · raised</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg · overlay</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-ink)"></div><div class="lbl">ink · signature</div></div>
</div></body></html>
