<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-body)}
  .wrap{padding:20px 24px;box-sizing:border-box}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .sw{width:86px;height:86px;border-radius:8px;border:1px solid var(--border-1);
      display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;
      font-family:var(--font-mono);font-size:9.5px;font-weight:500}
  .sw .n{color:rgba(255,255,255,.92)}.sw .h{color:rgba(255,255,255,.65)}
  .sw.l .n{color:var(--fg-1)}.sw.l .h{color:var(--fg-3)}
  .lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;
       letter-spacing:.12em;color:var(--fg-3);margin:0 0 8px}
</style></head><body><div class="wrap">
  <p class="lbl">Paper (background scale)</p>
  <div class="row">
    <div class="sw l" style="background:#FFFFFF"><span class="n">paper-0</span><span class="h">#FFFFFF</span></div>
    <div class="sw l" style="background:#FBFAF7"><span class="n">paper-1 · bg</span><span class="h">#FBFAF7</span></div>
    <div class="sw l" style="background:#F4F2EC"><span class="n">paper-2</span><span class="h">#F4F2EC</span></div>
    <div class="sw l" style="background:#E8E4DA"><span class="n">paper-3</span><span class="h">#E8E4DA</span></div>
    <div class="sw" style="background:#C7C1B3"><span class="n">paper-4</span><span class="h">#C7C1B3</span></div>
  </div>
  <p class="lbl" style="margin-top:14px">Ink (text scale)</p>
  <div class="row">
    <div class="sw" style="background:#111111"><span class="n">ink-1 · fg</span><span class="h">#111111</span></div>
    <div class="sw" style="background:#3A3A36"><span class="n">ink-2 · body</span><span class="h">#3A3A36</span></div>
    <div class="sw" style="background:#6B6B64"><span class="n">ink-3 · meta</span><span class="h">#6B6B64</span></div>
    <div class="sw" style="background:#9A998F"><span class="n">ink-4 · caption</span><span class="h">#9A998F</span></div>
  </div>
</div></body></html>
