<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-body)}
  .wrap{padding:20px 24px;box-sizing:border-box}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .sw{width:110px;height:78px;border-radius:8px;border:1px solid var(--border-1);
      display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;
      font-family:var(--font-mono);font-size:10px;font-weight:500}
  .sw .n{color:rgba(255,255,255,.94)}.sw .h{color:rgba(255,255,255,.7)}
  .lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;
       letter-spacing:.12em;color:var(--fg-3);margin:0 0 8px}
</style></head><body><div class="wrap">
  <p class="lbl">Semantic</p>
  <div class="row">
    <div class="sw" style="background:#1E40AF"><span class="n">link</span><span class="h">--link</span></div>
    <div class="sw" style="background:#15803D"><span class="n">success</span><span class="h">--success</span></div>
    <div class="sw" style="background:#B45309"><span class="n">warning</span><span class="h">--warning</span></div>
    <div class="sw" style="background:#B91C1C"><span class="n">danger</span><span class="h">--danger</span></div>
  </div>
  <p class="lbl" style="margin-top:14px">Code palette</p>
  <div class="row">
    <div class="sw" style="background:#0E1116"><span class="n">code-bg</span><span class="h">#0E1116</span></div>
    <div class="sw" style="background:#C586C0"><span class="n">keyword</span><span class="h">#C586C0</span></div>
    <div class="sw" style="background:#CE9178"><span class="n">string</span><span class="h">#CE9178</span></div>
    <div class="sw" style="background:#4EC9B0"><span class="n">type</span><span class="h">#4EC9B0</span></div>
    <div class="sw" style="background:#7C7C74"><span class="n">comment</span><span class="h">#7C7C74</span></div>
  </div>
</div></body></html>
