<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1)}
  .wrap{padding:20px 24px;box-sizing:border-box;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .btn{font-family:var(--font-body);font-size:14px;font-weight:500;
    padding:10px 18px;border-radius:8px;border:1px solid transparent;cursor:pointer;
    transition:all 120ms cubic-bezier(.2,.7,.2,1);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--accent);color:white;box-shadow:var(--shadow-ink)}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-secondary{background:transparent;color:var(--fg-1);border-color:var(--border-2)}
  .btn-secondary:hover{background:var(--paper-2)}
  .btn-ghost{background:transparent;color:var(--accent);padding-left:0;padding-right:0}
  .btn-ghost:hover{color:var(--accent-hover)}
  .btn-mono{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;
    padding:8px 14px;background:var(--fg-1);color:var(--paper-1);border-radius:999px}
</style></head><body><div class="wrap">
  <button class="btn btn-primary">Read the post</button>
  <button class="btn btn-secondary">Archive</button>
  <a class="btn btn-ghost" href="#">More on Medium ➡️</a>
  <button class="btn btn-mono">Subscribe</button>
</div></body></html>
